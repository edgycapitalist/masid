# Groq pilot batch: 3 architectures × 4 tasks × 3 trials = 36 trials
# Estimated time: ~10-12 minutes on Groq Developer tier
# Estimated cost: ~$0.10
#
# Usage: python -m masid.cli batch --config configs/groq_pilot.yaml

model:
  provider: "groq"
  base_url: "https://api.groq.com/openai/v1"
  name: "llama-3.1-8b-instant"
  temperature: 0.7
  max_tokens: 1024
  timeout: 60

experiment:
  trials_per_cell: 3
  max_rounds: 3
  seed: 42

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev

evaluation:
  judge_model: "llama-3.1-8b-instant"
  judge_provider: "groq"