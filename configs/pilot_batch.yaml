# Pilot batch: 2 trials per cell for quick validation.
# Usage: python -m masid.cli batch --config configs/pilot_batch.yaml

experiment:
  trials_per_cell: 2
  max_rounds: 2
  seed: 42

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev

model:
  provider: "ollama"
  name: "llama3.1:8b"

robustness:
  enabled: false
