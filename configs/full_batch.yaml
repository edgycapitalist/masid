# Full experiment batch: ~324 base trials + robustness tests.
# Run this on the 4090 machine.
# Usage: python -m masid.cli batch --config configs/full_batch.yaml

experiment:
  trials_per_cell: 12
  max_rounds: 3
  seed: 42

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev
  - research_synthesis
  - project_planning

# Primary models — run all three
models:
  - provider: "ollama"
    name: "llama3.1:8b"
  - provider: "ollama"
    name: "qwen2.5:7b"
  - provider: "ollama"
    name: "mistral:7b"

robustness:
  enabled: true
  trials_per_cell: 20
  fault_types:
    - degraded_prompt

evaluation:
  judge_model: "llama3.1:8b"
  judge_provider: "ollama"
  spot_check_pct: 0.10

storage:
  db_path: "data/experiments.db"
