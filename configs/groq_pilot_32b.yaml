# Groq pilot with Llama 3.3 70B — stronger model.
# 3 architectures × 4 tasks × 2 trials = 24 trials
# Estimated time: ~15 minutes
# Estimated cost: ~$0.50
#
# Usage: python -m masid.cli batch --config configs/groq_pilot_70b.yaml

model:
  provider: "groq"
  base_url: "https://api.groq.com/openai/v1"
  name: "qwen/qwen3-32b"
  temperature: 0.7
  max_tokens: 1024
  timeout: 120

experiment:
  trials_per_cell: 2
  max_rounds: 3
  seed: 42

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev

evaluation:
  judge_model: "qwen/qwen3-32b"
  judge_provider: "groq"