# Groq pilot: all 3 domains × 3 architectures × 2 trials per task
# software_dev: 4 tasks × 2 = 8 per arch = 24
# research_synthesis: 3 tasks × 2 = 6 per arch = 18
# project_planning: 3 tasks × 2 = 6 per arch = 18
# Total: 60 trials
# Estimated time: ~30-40 minutes
# Estimated cost: ~$2

model:
  provider: "groq"
  base_url: "https://api.groq.com/openai/v1"
  name: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 2048
  timeout: 120

experiment:
  trials_per_cell: 2
  max_rounds: 3
  seed: 42

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev
  - research_synthesis
  - project_planning

evaluation:
  judge_model: "llama-3.3-70b-versatile"
  judge_provider: "groq"
