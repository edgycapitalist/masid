# Run experiments using Groq's free API tier.
# Requires GROQ_API_KEY in .env file.
#
# Free tier limits: 1,000 requests/day, 6,000 tokens/min
# Each trial uses ~13 requests, so ~75 trials/day max.
#
# Usage: python -m masid.cli run --architecture irm --domain software_dev --config configs/groq.yaml

model:
  provider: "groq"
  base_url: "https://api.groq.com/openai/v1"
  name: "llama-3.1-8b-instant"
  temperature: 0.7
  max_tokens: 1024
  timeout: 60

experiment:
  trials_per_cell: 2
  max_rounds: 3
  seed: 42

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev

evaluation:
  # Use the same model for judging on Groq
  judge_model: "llama-3.1-8b-instant"
  judge_provider: "groq"