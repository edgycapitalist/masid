# Test run: 1 trial per cell with OpenAI gpt-4.1-mini as judge
# 3 architectures × 10 tasks × 1 trial = 30 trials
# Purpose: verify the judge discriminates (doesn't give 0.8 on everything)
#
# Requires OPENAI_API_KEY in .env file

model:
  provider: "groq"
  base_url: "https://api.groq.com/openai/v1"
  name: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 2048
  timeout: 120

experiment:
  trials_per_cell: 1
  max_rounds: 3
  seed: null

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev
  - research_synthesis
  - project_planning

evaluation:
  judge_provider: "openai"
  judge_model: "gpt-4.1-mini"
