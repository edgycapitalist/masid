# Cross-model validation: gpt-4.1-mini as agent
# 3 architectures × 10 tasks × 3 trials per cell = 90 trials
# Purpose: test if architecture rankings hold with a different model (RQ4)
#
# Saves to a SEPARATE database to avoid contaminating the primary Llama results.
# Requires OPENAI_API_KEY in .env file

model:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  name: "gpt-4.1-mini"
  temperature: 0.7
  max_tokens: 2048
  timeout: 120

experiment:
  trials_per_cell: 2
  max_rounds: 3
  seed: null

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev
  - research_synthesis
  - project_planning

evaluation:
  judge_provider: "openai"
  judge_model: "gpt-4.1-mini"

storage:
  db_path: "data/experiments_gpt41mini.db"