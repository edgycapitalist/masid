# Full-scale experiment: 12 trials per cell
# 3 architectures × 10 tasks × 12 trials = 360 total
#
# Safe to run multiple times — the batch command checks the DB
# and only runs trials that are still needed. Seeds never overlap.
#
# Run with: python -m masid.cli batch --config configs/groq_full.yaml
# Resume:   python -m masid.cli batch --config configs/groq_full.yaml
#           (same command — skips completed cells automatically)

model:
  provider: "groq"
  base_url: "https://api.groq.com/openai/v1"
  name: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 2048
  timeout: 120

architectures:
  - "irm"
  - "jro"
  - "iamd"

domains:
  - "software_dev"
  - "research_synthesis"
  - "project_planning"

experiment:
  trials_per_cell: 17
  max_rounds: 3
  seed: null

evaluation:
  judge_provider: "openai"
  judge_model: "gpt-4.1-mini"
