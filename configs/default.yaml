# MASID Default Configuration
# Override any setting via CLI flags or custom config files.

# --- Model Serving ---
model:
  # Provider: "ollama" for local, "litellm" for API models
  provider: "ollama"
  # Base URL for the model endpoint
  base_url: "http://localhost:11434"
  # Default model to use (Ollama model tag)
  name: "llama3.1:8b"
  # Generation parameters
  temperature: 0.7
  max_tokens: 2048
  # Timeout per LLM call in seconds
  timeout: 120

# --- Experiment ---
experiment:
  # Number of trials per (architecture, domain, model) cell
  trials_per_cell: 12
  # Maximum revision rounds per trial
  max_rounds: 3
  # Random seed for reproducibility (null = random)
  seed: 42

# --- Architectures ---
architectures:
  - irm
  - jro
  - iamd

# --- Task Domains ---
domains:
  - software_dev
  - research_synthesis
  - project_planning

# --- Evaluation ---
evaluation:
  # LLM-as-judge model (used for research_synthesis scoring)
  judge_model: "llama3.1:8b"
  judge_provider: "ollama"
  # Percentage of trials to manually spot-check
  spot_check_pct: 0.10

# --- Robustness Testing ---
robustness:
  enabled: false
  # Number of fault-injected trials per (architecture, domain) cell
  trials_per_cell: 20
  # Fault types: "degraded_prompt", "random_output", "slow_response"
  fault_types:
    - degraded_prompt

# --- Storage ---
storage:
  # SQLite database path (relative to project root)
  db_path: "data/experiments.db"

# --- Logging ---
logging:
  level: "INFO"
  # Log file path (null = stdout only)
  file: null
