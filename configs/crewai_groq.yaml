# CrewAI experiment — Groq cloud inference (llama-3.3-70b-versatile)
#
# Prerequisites:
#   Add GROQ_API_KEY=<your-key> to .env
#   Get a key at: https://console.groq.com
#
# Run:    masid-crewai batch --config configs/crewai_groq.yaml
# Resume: same command — skips completed cells automatically
#
# Timing estimate: ~85s/trial → ~2 hours for 90 trials (10/cell)
#                               ~40 minutes for 27 trials (3/cell)

agent_model:
  model: "groq/llama-3.3-70b-versatile"
  base_url: ""        # not needed — LiteLLM uses GROQ_API_KEY from .env
  api_key: "dummy"    # LiteLLM reads GROQ_API_KEY from environment
  temperature: 0.7
  max_tokens: 2048

experiment:
  trials_per_cell: 10
  max_rounds: 3

architectures:
  - irm
  - jro
  - iamd

domains:
  - software_dev
  - research_synthesis
  - project_planning

task_ids:
  software_dev: sw_001
  research_synthesis: rs_001
  project_planning: pp_001

judge:
  judge_provider: openai
  judge_model: gpt-4.1-mini

storage:
  db_path: data/crewai_groq_experiments.db
